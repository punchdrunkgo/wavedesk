<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍱 식신e식권 식당 — KLCSM Desk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#f0f4f8;color:#111827;font-size:14px}

/* 상단 헤더 */
.top-bar{background:#1e3a8a;color:#fff;padding:10px 16px;
         display:flex;align-items:center;justify-content:space-between}
.top-title{font-size:.9rem;font-weight:700;letter-spacing:-.3px}
.top-back{font-size:.75rem;color:#93c5fd;text-decoration:none}
.top-back:hover{color:#fff}

/* 컨트롤 바 */
.ctrl{background:#fff;border-bottom:1px solid #e5e7eb;
      padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px;
      position:sticky;top:0;z-index:50}
.ctrl input{flex:1;min-width:180px;height:34px;padding:0 10px;font-size:13px;
            border:1px solid #d1d5db;border-radius:6px;
            background:#f9fafb;color:#111827;outline:none}
.ctrl input:focus{border-color:#3b82f6}
.cat-wrap{display:flex;flex-wrap:wrap;gap:6px;width:100%}
.cat-btn{height:30px;padding:0 12px;font-size:12px;border:1px solid #d1d5db;
         border-radius:20px;background:#fff;color:#6b7280;cursor:pointer;
         white-space:nowrap;transition:all .12s}
.cat-btn.on{background:#1e3a8a;color:#fff;border-color:#1e3a8a}
.sort-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
.sort-btn{height:30px;padding:0 10px;font-size:12px;border:1px solid #d1d5db;
          border-radius:6px;background:#fff;color:#6b7280;cursor:pointer}
.sort-btn.on{background:#f1f5f9;color:#1e3a8a;font-weight:600;border-color:#93c5fd}
.check-label{font-size:12px;color:#6b7280;display:flex;align-items:center;gap:4px;
             cursor:pointer;white-space:nowrap}

/* 통계 바 */
.stat-bar{padding:8px 16px;font-size:12px;color:#6b7280;
          display:flex;gap:12px;flex-wrap:wrap}
.stat-item span{font-weight:600;color:#1e3a8a}

/* 그리드 */
.main{padding:12px 16px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;
      padding:12px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.card:hover{border-color:#93c5fd;box-shadow:0 2px 8px rgba(59,130,246,.12)}
.card.closed{opacity:.45}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.card-name{font-size:13px;font-weight:600;color:#111827;line-height:1.3}
.card-dist{font-size:11px;color:#9ca3af;white-space:nowrap;margin-left:4px;flex-shrink:0}
.card-meta{font-size:11px;color:#6b7280;margin-top:2px}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;
       margin-top:3px;font-weight:500}
.b-k{background:#dcfce7;color:#166534}
.b-j{background:#dbeafe;color:#1e40af}
.b-c{background:#ffedd5;color:#9a3412}
.b-f{background:#f3e8ff;color:#6b21a8}
.b-o{background:#f1f5f9;color:#475569}
.b-closed{background:#fee2e2;color:#991b1b}
.near-tag{font-size:10px;color:#ea580c;margin-top:2px}

/* 상세 패널 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;
         display:none;transition:opacity .2s}
.overlay.on{display:block}
.panel{position:fixed;top:0;right:-100%;width:min(380px,100%);height:100%;
       background:#fff;border-left:1px solid #e5e7eb;overflow-y:auto;
       transition:right .22s ease;z-index:100;padding:0}
.panel.open{right:0}
.panel-header{background:#1e3a8a;color:#fff;padding:14px 16px;
              display:flex;justify-content:space-between;align-items:flex-start}
.panel-name{font-size:15px;font-weight:700;line-height:1.3;flex:1;padding-right:8px}
.panel-close{background:none;border:none;color:#93c5fd;font-size:20px;
             cursor:pointer;line-height:1;padding:0;flex-shrink:0}
.panel-close:hover{color:#fff}
.panel-body{padding:14px 16px}
.panel-dist-badge{display:flex;gap:6px;align-items:center;margin-bottom:12px}
.p-row{display:flex;gap:8px;margin-bottom:10px;font-size:13px;align-items:flex-start}
.p-label{color:#9ca3af;white-space:nowrap;min-width:56px;flex-shrink:0;font-size:12px}
.p-val{color:#111827;line-height:1.5}
.menu-box{background:#f8faff;border:1px solid #e0e7ff;border-radius:8px;
          padding:10px 12px;margin:12px 0}
.menu-box-title{font-size:11px;color:#6b7280;font-weight:600;
                text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.menu-item{font-size:12px;color:#1e3a8a;margin-bottom:4px}
.warn-box{background:#fee2e2;border-radius:6px;padding:8px 10px;
          font-size:12px;color:#991b1b;margin-bottom:10px;font-weight:600}
.naver-btn{display:block;text-align:center;padding:10px;margin-top:12px;
           background:#03c75a;color:#fff;border-radius:8px;text-decoration:none;
           font-size:13px;font-weight:600;transition:background .12s}
.naver-btn:hover{background:#02b350}
.verify-note{font-size:11px;color:#9ca3af;margin-top:14px;
             padding-top:10px;border-top:1px solid #f3f4f6;line-height:1.5}

/* 빈 상태 */
.empty{text-align:center;padding:3rem 1rem;color:#9ca3af;font-size:13px}

/* 업데이트 노트 */
.update-note{font-size:11px;color:#9ca3af;text-align:center;
             padding:12px 16px;border-top:1px solid #f3f4f6;margin-top:8px}

@media(max-width:500px){
  .grid{grid-template-columns:1fr 1fr}
  .panel{width:100%}
}
</style>
</head>

    </div>
  </div>
</div>

<div class="stat-bar" id="stat-bar"></div>

<div class="main">

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">

</div>

const UPDATED='2026-06-26';
let curCat='ALL', curSort='dist';

function setCat(el){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); curCat=el.dataset.cat; render();
}
function setSort(s,el){
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); curSort=s; render();
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const hc=document.getElementById('hc').checked;
  let data=DB.filter(r=>{
    if(hc && r.closed) return false;
    if(curCat!=='ALL' && r.cat!==curCat) return false;
    if(q && !r.n.toLowerCase().includes(q) && !(r.menus||[]).join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
  if(curSort==='dist') data.sort((a,b)=>a.d-b.d);
  else data.sort((a,b)=>a.n.localeCompare(b.n,'ko'));

  // 통계
  const cats={KOREAN:0,JAPANESE:0,CHINESE:0,CAFE:0,OTHERS:0};
  data.forEach(r=>{if(!r.closed) cats[r.cat]=(cats[r.cat]||0)+1;});
  const sb=document.getElementById('stat-bar');
  sb.innerHTML=`<span>${data.length}개 표시</span>`+
    Object.entries(CAT).map(([k,v])=>cats[k]?`<span>${v} <span>${cats[k]}</span></span>`:'').join('');

  const g=document.getElementById('grid');
  const em=document.getElementById('empty');
  if(!data.length){g.innerHTML='';em.style.display='block';return;}
  em.style.display='none';

  g.innerHTML=data.map(r=>{
    const i=DB.indexOf(r);
    const bc=BADGE[r.cat]||'b-o';
    const cl=r.closed?' closed':'';
    const isNear=r.d<=30 && !r.closed;
    return `<div class="card${cl}" onclick="openPanel(${i})">
      <div class="card-top">
        <span class="card-name">${r.n}</span>
        <span class="card-dist">${r.d}m</span>
      </div>
      <div class="card-meta">${CAT[r.cat]||r.cat}</div>
      ${r.closed?'<span class="badge b-closed">영구폐업</span>':'<span class="badge '+bc+'">'+(r.d<=10?'📍 사옥 내':r.d<=100?'🚶 도보 1~2분':'🚶 도보 '+Math.round(r.d/70)+'분')+'</span>'}
      ${r.note&&!r.closed&&r.note!=='폐업'?'<div class="near-tag">'+r.note+'</div>':''}
    </div>`;
  }).join('');

  document.getElementById('udate').textContent=
    `데이터 기준: ${UPDATED} (제미나이 Part4 검증 완료 · Part1/3 일부 미검증) · 매월 1회 업데이트`;
}

function openPanel(i){
  const r=DB[i];
  document.getElementById('p-name').textContent=r.n;
  const bc=BADGE[r.cat]||'b-o';
  let h='';
  if(r.closed) h+=`<div class="warn-box">★ 영구폐업 (2025.10.21) — 식권 사용 불가</div>`;
  h+=`<div class="panel-dist-badge">
    <span class="badge ${bc}">${CAT[r.cat]}</span>
    <span style="font-size:12px;color:#6b7280">사옥에서 ${r.d}m</span>
  </div>`;
  if(r.note && r.note!=='폐업') h+=`<div style="font-size:12px;color:#ea580c;margin-bottom:10px;font-weight:500">📌 ${r.note}</div>`;
  h+=`<div class="p-row"><span class="p-label">영업시간</span><span class="p-val">${r.hrs||'확인 필요'}</span></div>
  <div class="p-row"><span class="p-label">휴무일</span><span class="p-val">${r.off||'확인 필요'}</span></div>`;
  if(r.menus&&r.menus.length){
    h+=`<div class="menu-box"><div class="menu-box-title">대표 메뉴</div>`;
    r.menus.forEach(m=>h+=`<div class="menu-item">• ${m}</div>`);
    h+=`</div>`;
  }
  if(r.naver&&!r.closed) h+=`<a class="naver-btn" href="${r.naver}" target="_blank">네이버 지도에서 보기 →</a>`;
  h+=`<div class="verify-note">영업시간·메뉴는 변동될 수 있습니다.<br>방문 전 네이버 지도에서 재확인을 권장합니다.<br>데이터 기준일: ${UPDATED}</div>`;
  document.getElementById('p-body').innerHTML=h;
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('on');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

render();
</script>
